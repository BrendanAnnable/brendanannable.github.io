<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {%- seo -%}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <script>
    (function() {
      const key = 'site-theme';
      const stored = localStorage.getItem(key);
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      window.__setTheme = function(next) {
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem(key, next);
        // Update button text if present
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.innerText = next === 'dark' ? '☀️ Light' : '🌙 Dark';
      };
      window.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.innerText = (document.documentElement.getAttribute('data-theme') === 'dark') ? '☀️ Light' : '🌙 Dark';
      });
    })();
  </script>
</head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <h1 class="site-title"><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
        <p class="site-description">{{ site.description }}</p>
        <nav class="site-nav">
          <ul>
          {%- for item in site.nav -%}
            <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
          {%- endfor -%}
          </ul>
        <button id="theme-toggle" class="theme-toggle" onclick="__setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">🌙 Dark</button>
    </nav>
      </div>
    </header>
    <main class="wrap content">
      {{ content }}
    </main>
    <footer class="site-footer wrap">
      <p>© {{ site.time | date: "%Y" }} · Built with Jekyll · <a href="https://github.com/YOUR_GITHUB_USERNAME/emhass-amber">Source</a></p>
    </footer>
  </body>
</html>
